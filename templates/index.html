<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Diagramme de Gantt</title>
  <link rel="stylesheet" href="/static/styles.css"/>
</head>
<body>

  <div class="container">
    <h1>Planificateur de tâches</h1>

    <section class="form-section">
      <h2>Ajouter une tâche</h2>

      <!-- Grille partagée : formulaire + lignes de tâches -->
      <div class="task-grid">

        <!-- Ligne formulaire -->
        <div class="task-row task-row--form" id="taskForm">

          <div class="task-cell">
            <label for="taskName">Tâche</label>
            <input type="text" id="taskName" placeholder="Nom de la tâche" required />
          </div>

          <div class="task-cell">
            <label for="taskDuration">Durée (jours)</label>
            <input type="number" id="taskDuration" min="1" placeholder="Ex : 5" required />
          </div>

          <div class="task-cell">
            <label for="predecessors">
              Tâche(s) prédécesseur(s)
              <span class="optional">facultatif</span>
            </label>
            <input type="text" id="predecessors" placeholder="Ex : Conception" />
          </div>

          <div class="task-cell">
            <label for="successors">
              Tâche(s) successeur(s)
              <span class="optional">facultatif</span>
            </label>
            <input type="text" id="successors" placeholder="Ex : Tests" />
          </div>

          <div class="task-cell task-cell--actions">
            <label>&nbsp;</label>
            <button id="submitBtn" onclick="submitTask()">+ Ajouter</button>
          </div>

        </div>

        <!-- Séparateur entre formulaire et tâches -->
        <div class="grid-divider hidden" id="gridDivider"></div>

        <!-- Les lignes de tâches s'insèrent ici -->
        <div id="taskList"></div>

      </div>
      
<div class="action-bar hidden" id="validateBar">
        <button class="btn-clear" id="clearBtn" onclick="askClearConfirm()">
          <span class="btn-icon">⊘</span> Vider la liste
        </button>
        <button class="btn-validate" id="validateBtn" onclick="validateTasks()">
          <span class="btn-icon">✓</span> Valider les tâches
        </button>
      </div>

    </section>
  </div>

  <!-- Modale de confirmation -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <div class="modal-icon">⚠</div>
      <h3 class="modal-title">Vider la liste ?</h3>
      <p class="modal-message">Toutes les tâches seront supprimées. Cette action est irréversible.</p>
      <div class="modal-actions">
        <button class="modal-btn modal-btn--cancel" onclick="closeModal()">Annuler</button>
        <button class="modal-btn modal-btn--confirm" onclick="confirmClear()">Oui, vider</button>
      </div>
    </div>
  </div>

    </section>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
