{% extends "base.html" %}

{% block title %}Saisie des tâches{% endblock %}

{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/form.css') }}"/>
{% endblock %}

{% block content %}
<section class="form-section">
  <h2>Ajouter une tâche</h2>

  <div class="task-grid">

    <div class="task-row task-row--form">
      <div class="task-cell">
        <label for="taskName">Tâche</label>
        <input type="text" id="taskName" placeholder="Nom de la tâche" />
      </div>
      <div class="task-cell">
        <label for="taskDuration">Durée</label>
        <input type="number" id="taskDuration" min="1" placeholder="Ex : 5" />
      </div>
      <div class="task-cell">
        <label for="predecessors">
          Tâche(s) prédécesseur(s)
          <span class="optional">facultatif</span>
        </label>
        <input type="text" id="predecessors" placeholder="Ex : Conception, Tests" />
      </div>
      <div class="task-cell task-cell--actions">
        <label>&nbsp;</label>
        <button type="button" id="submitBtn" onclick="submitTask()">+ Ajouter</button>
      </div>
    </div>

    <div class="grid-divider hidden" id="gridDivider"></div>
    <div id="taskList"></div>

  </div>

  <div class="action-bar hidden" id="actionBar">
    <button class="btn-clear" onclick="askClearConfirm()">
      <span class="btn-icon">⊘</span> Vider la liste
    </button>
    <button class="btn-validate" onclick="validateTasks()">
      <span class="btn-icon">✓</span> Valider les tâches
    </button>
  </div>

</section>

<!-- Formulaire caché pour soumettre les tâches à Flask -->
<form id="ganttForm" action="/gantt" method="POST" style="display:none;">
  <input type="hidden" id="tasksInput" name="tasks" />
</form>

<script id="saved-tasks-data" type="application/json">
  {{ tasks | default([]) | tojson }}
</script>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/form.js') }}"></script>
{% endblock %}
